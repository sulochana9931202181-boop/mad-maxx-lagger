<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐌𝐀𝐃 𝐌𝐀𝐗𝐗 INSTANT CRASHER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            background: #000;
            font-family: 'Courier New', monospace;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #stats {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-size: 14px;
            z-index: 999;
            background: rgba(0,0,0,0.95);
            padding: 15px;
            border: 2px solid #0f0;
            font-weight: bold;
        }
        #title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 80px;
            font-weight: bold;
            text-shadow: 0 0 30px #0f0, 0 0 60px #f0f, 0 0 90px #00ffff;
            z-index: 10;
            animation: glitch 0.1s infinite;
        }
        @keyframes glitch {
            0% { text-shadow: 0 0 30px #0f0, 0 0 60px #f0f; }
            50% { text-shadow: 0 0 60px #f0f, 0 0 90px #00ffff; }
            100% { text-shadow: 0 0 30px #00ffff, 0 0 60px #0f0; }
        }
    </style>
</head>
<body>
    <div id="stats">
        🔥 FPS: <span id="fps">0</span><br>
        💥 PARTICLES: <span id="particles">0</span><br>
        ⚡ LINES: <span id="lines">0</span><br>
        🌀 TEXT/MS: <span id="text">0</span>
    </div>
    <div id="title">𝐌𝐀𝐃 𝐌𝐀𝐗𝐗</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let frameCount = 0;
        let lastTime = Date.now();
        let totalText = 0;
        let drawnLines = 0;

        const words = ['MAD', 'MAXX', 'LAG', 'CRASH', 'DOOM', 'ERROR', 'BOMB', 'CHAOS', '∞', '█'];

        // ULTRA SIMPLE PARTICLE - No class overhead
        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 25,
                vy: (Math.random() - 0.5) * 25,
                size: Math.random() * 10 + 1,
                color: `hsl(${Math.floor(Math.random() * 360)}, 100%, 50%)`
            };
        }

        // Initialize with 50k particles immediately (no batching)
        for (let i = 0; i < 50000; i++) {
            particles.push(createParticle());
        }

        console.log("🔥 MADMAXX ACTIVATED - 50K PARTICLES SPAWNED!");

        function animate() {
            frameCount++;
            const now = Date.now();

            if (now - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = now;
            }

            // AGGRESSIVE clear
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw particles FAST
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3; // gravity
                
                // Wrap around
                if (p.x < 0 || p.x > canvas.width) p.vx *= -0.9;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -0.9;
                
                p.x = Math.max(0, Math.min(canvas.width, p.x));
                p.y = Math.max(0, Math.min(canvas.height, p.y));
                
                // Draw
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }

            // MASSIVE LINES - direct drawing
            drawnLines = 0;
            for (let i = 0; i < 5000; i++) {
                const p1 = particles[Math.floor(Math.random() * particles.length)];
                const p2 = particles[Math.floor(Math.random() * particles.length)];
                ctx.strokeStyle = `rgba(0,255,100,0.5)`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
                drawnLines++;
            }

            // MASSIVE TEXT - no save/restore overhead
            for (let t = 0; t < 100000; t++) {
                ctx.fillStyle = `hsl(${Math.floor(Math.random() * 360)}, 100%, 50%)`;
                ctx.font = `${Math.floor(Math.random() * 20 + 8)}px monospace`;
                ctx.fillText(
                    words[Math.floor(Math.random() * words.length)],
                    Math.random() * canvas.width,
                    Math.random() * canvas.height
                );
                totalText++;
            }

            // Add MORE particles constantly
            for (let i = 0; i < 2000; i++) {
                particles.push(createParticle());
                if (particles.length > 500000) {
                    particles.splice(0, 1000); // Remove old ones
                }
            }

            // Update stats
            document.getElementById('particles').textContent = particles.length;
            document.getElementById('lines').textContent = drawnLines;
            document.getElementById('text').textContent = Math.floor(totalText / 1000000) + 'M';

            // SPAM CONSOLE
            for (let s = 0; s < 100; s++) {
                console.log(`🔥💥 MADMAXX ACTIVE - Particles: ${particles.length} | Frame: ${frameCount}`);
            }

            requestAnimationFrame(animate);
        }

        // START IMMEDIATELY - NO LOADING!
        animate();

        // CONTINUOUS BOMBING
        setInterval(() => {
            for (let i = 0; i < 1000; i++) {
                console.log(`💥 CRASH SEQUENCE - ${Math.floor(Math.random() * 999999)} OPERATIONS/SEC`);
            }
        }, 1);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
